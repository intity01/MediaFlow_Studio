version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  frontend-web:
    build: ./frontend-web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-web:/app
    command: npm run dev
